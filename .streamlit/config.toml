[server]
fileWatcherType = "none"

# Kokoro Studio — "Kokoro indigo" theme. Shared values live in [theme]; the
# light and dark blocks define both modes so the toolbar mode toggle is shown.
[theme]
# indigo-600: white button text clears WCAG AA contrast (6.29:1)
primaryColor = "#4F46E5"
baseRadius = "8px"
linkUnderline = false
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
# h1 (the page title) extrabold at 800 — heavier than Streamlit's 700 default — for
# a more distinct title; h2–h6 keep the 600 default. Headings already use the body
# Inter, so no separate headingFont is needed.
headingFontWeights = [800, 600, 600, 600, 600, 600]
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"

[theme.light]
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f6f8fa"
textColor = "#1f2328"
borderColor = "#d0d7de"
redColor = "#cf222e"
orangeColor = "#bf8700"
greenColor = "#1a7f37"

[theme.dark]
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
borderColor = "#30363d"
redColor = "#ff7b72"
orangeColor = "#e3b341"
greenColor = "#3fb950"
